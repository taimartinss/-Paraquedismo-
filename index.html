<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stratus Paraquedismo | Salto de Paraquedas</title>

<meta name="description" content="Salto duplo de paraquedas com instrutores profissionais. Viva a experiência da queda livre.">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Open Sans',sans-serif;
color:#1A1A1A;
overflow-x:hidden;
}

/* CORES */

:root{
--blue:#00AADC;
--blue-dark:#006FA6;
--black:#1A1A1A;
}

/* PROMO BAR */

.promo{
position:fixed;
top:0;
width:100%;
background:#00AADC;
color:white;
text-align:center;
padding:8px;
font-weight:700;
z-index:2000;
}

/* HEADER */

header{
position:fixed;
top:40px;
width:100%;
z-index:1000;
transition:.3s;
}

.header-inner{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-family:Montserrat;
font-weight:900;
color:white;
letter-spacing:3px;
}

/* HERO */

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.8),rgba(0,0,0,.2));
}

.hero-content{
position:relative;
z-index:2;
top:35%;
margin-left:10%;
color:white;
max-width:700px;
}

.hero-content h1{
font-family:Montserrat;
font-size:64px;
font-weight:900;
margin-bottom:25px;
}

.cta{
border:2px solid white;
padding:14px 36px;
border-radius:30px;
text-decoration:none;
color:white;
font-family:Montserrat;
font-weight:700;
}

/* EXPERIENCE */

.experience{
padding:100px 20px;
text-align:center;
}

.exp-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:40px;
max-width:900px;
margin:auto;
}

.exp-item h2{
font-family:Montserrat;
color:#00AADC;
font-size:40px;
}

/* CALCULATOR */

.calculator{
background:#00AADC;
color:white;
padding:100px 20px;
text-align:center;
}

.calc-box{
max-width:400px;
margin:auto;
}

.calc-box select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

.total{
font-size:34px;
font-family:Montserrat;
margin:20px 0;
}

/* INSTAGRAM */

.instagram{
padding:100px 20px;
text-align:center;
}

.insta-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.insta-grid img{
width:100%;
height:200px;
object-fit:cover;
}

/* FORM */

.booking{
background:#006FA6;
color:white;
padding:100px 20px;
text-align:center;
}

.booking form{
max-width:500px;
margin:auto;
}

.booking input,
.booking select{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

.booking button{

background:white;
color:#1A1A1A;
border:none;
padding:14px 30px;
font-weight:700;
cursor:pointer;

}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
}

</style>
</head>

<body>

<div class="promo">
🔥 PROMOÇÃO DE HOJE — SALTO DUPLO R$499
</div>

<header>
<div class="header-inner">
<div class="logo">STRATUS</div>
</div>
</header>

<section class="hero">

<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-skydiving-1637/1080p.mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content">

<h1>UMA EXPERIÊNCIA QUE VOCÊ NUNCA VAI ESQUECER</h1>

<a class="cta" href="#calc">SIMULAR SALTO</a>

</div>

</section>

<section class="experience">

<h1>A EXPERIÊNCIA DO SALTO</h1>

<div class="exp-grid">

<div class="exp-item">
<h2>14.000</h2>
<p>PÉS DE ALTURA</p>
</div>

<div class="exp-item">
<h2>200</h2>
<p>KM/H QUEDA LIVRE</p>
</div>

<div class="exp-item">
<h2>60</h2>
<p>SEGUNDOS ADRENALINA</p>
</div>

<div class="exp-item">
<h2>7</h2>
<p>MINUTOS DE VOO</p>
</div>

</div>

</section>

<section class="calculator" id="calc">

<h1>SIMULE SEU SALTO</h1>

<div class="calc-box">

<select id="salto">
<option value="499">Salto Duplo</option>
<option value="699">Salto + Vídeo</option>
<option value="779">Salto + Vídeo + Fotos</option>
</select>

<div class="total">
R$ <span id="price">499</span>
</div>

<a class="cta" id="reservar">RESERVAR AGORA</a>

</div>

</section>

<section class="instagram">

<h1>@STRATUS</h1>

<div class="insta-grid">

<img src="https://images.unsplash.com/photo-1508614589041-895b88991e3e">
<img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<img src="https://images.unsplash.com/photo-1601024445121-e5b82f020549">

</div>

</section>

<section class="booking">

<h1>RESERVE SEU SALTO</h1>

<form id="form">

<input type="text" placeholder="Nome" required>

<input type="tel" placeholder="Telefone" required>

<input type="date" required>

<select>
<option>Peso até 90kg</option>
<option>90kg a 110kg</option>
</select>

<button type="submit">
Reservar pelo WhatsApp
</button>

</form>

</section>

<a class="whatsapp" href="https://wa.me/5500000000000">
<i class="fab fa-whatsapp"></i>
</a>

<script>

/* CALCULADORA */

const salto=document.getElementById("salto")
const price=document.getElementById("price")

salto.addEventListener("change",()=>{
price.innerText=salto.value
})

/* WHATSAPP */

document.getElementById("reservar").onclick=()=>{

let valor=salto.value

let msg=`Olá! Quero reservar salto de paraquedas. Valor selecionado: R$${valor}`

window.open(`https://wa.me/5500000000000?text=${encodeURIComponent(msg)}`)

}

/* FORM */

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

let msg="Olá! Quero reservar um salto de paraquedas."

window.open(`https://wa.me/5500000000000?text=${encodeURIComponent(msg)}`)

})

</script>

</body>
</html>
