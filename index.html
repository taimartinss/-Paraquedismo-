<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratus Paraquedismo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(180deg,#f8fcff,#eef6ff);
color:#003049;
line-height:1.7;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(15px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
z-index:1000;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.logo img{
height:50px;
}

nav{
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
color:#003049;
font-weight:600;
font-size:14px;
}

/* HERO CARROSSEL PREMIUM */

.hero{
margin-top:90px;
position:relative;
height:75vh;
overflow:hidden;
}

.carousel{
display:flex;
height:100%;
transition:transform 0.8s ease-in-out;
}

.slide{
min-width:100%;
height:100%;
position:relative;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.5);
padding:30px 60px;
border-radius:20px;
color:white;
text-align:center;
}

.overlay h1{
font-size:32px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,0.6);
border:none;
font-size:28px;
padding:10px 18px;
cursor:pointer;
border-radius:50%;
}

.arrow.left{ left:20px; }
.arrow.right{ right:20px; }

.dots{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

.dots span{
display:inline-block;
width:12px;
height:12px;
background:white;
margin:0 5px;
border-radius:50%;
opacity:0.5;
cursor:pointer;
}

.dots .active{
opacity:1;
}

/* SECTIONS */

section{
padding:100px 10%;
max-width:1200px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:50px;
font-size:28px;
color:#0077b6;
}

.card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
margin-bottom:40px;
}

.preco{
font-size:20px;
font-weight:700;
color:#00b4d8;
margin:15px 0;
}

.botao{
display:inline-block;
padding:12px 30px;
background:#00b4d8;
color:white;
text-decoration:none;
border-radius:30px;
font-weight:600;
transition:0.3s;
}

.botao:hover{
background:#0077b6;
transform:scale(1.05);
}

/* FAQ */

details{
background:white;
padding:25px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

details summary{
cursor:pointer;
font-weight:600;
color:#0077b6;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
z-index:1000;
}

.whatsapp img{
width:30px;
}

/* MOBILE */

@media(max-width:900px){

.hero{
height:60vh;
}

.overlay h1{
font-size:22px;
}

.arrow{
display:none;
}

}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="IMG_1249.jpeg">
</div>
<nav>
<a href="#agendamentos">Agendamentos</a>
<a href="#faq">Perguntas Frequentes</a>
<a href="#orientacoes">Orientações</a>
<a href="#contato">Contato</a>
</nav>
</header>

<div class="hero">
<div class="carousel" id="carousel">
<div class="slide"><img src="IMG_1250.jpeg"></div>
<div class="slide"><img src="IMG_1248.jpeg"></div>
<div class="slide"><img src="IMG_1249.jpeg"></div>
</div>

<button class="arrow left" onclick="prevSlide()">❮</button>
<button class="arrow right" onclick="nextSlide()">❯</button>

<div class="overlay">
<h1>Stratus Paraquedismo</h1>
</div>

<div class="dots" id="dots"></div>
</div>

<!-- RESTANTE DO SITE (mantido igual ao anterior: FAQ, ORIENTAÇÕES etc.) -->

<a class="whatsapp" href="https://wa.me/5531996115628" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
let index=0;
const carousel=document.getElementById("carousel");
const slides=document.querySelectorAll(".slide");
const total=slides.length;
const dotsContainer=document.getElementById("dots");

for(let i=0;i<total;i++){
let dot=document.createElement("span");
dot.addEventListener("click",()=>goToSlide(i));
dotsContainer.appendChild(dot);
}

function updateCarousel(){
carousel.style.transform="translateX(-"+index*100+"%)";
document.querySelectorAll(".dots span").forEach((dot,i)=>{
dot.classList.toggle("active",i===index);
});
}

function nextSlide(){
index=(index+1)%total;
updateCarousel();
}

function prevSlide(){
index=(index-1+total)%total;
updateCarousel();
}

function goToSlide(i){
index=i;
updateCarousel();
}

setInterval(nextSlide,5000);

updateCarousel();
</script>

</body>
</html>
